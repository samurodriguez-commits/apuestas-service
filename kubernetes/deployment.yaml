apiVersion: apps/v1

kind: Deployment

metadata:
  name: apuestas-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: apuestas-service

  template:
    metadata:
      labels:
        app: apuestas-service

    spec:
      containers:
      - name: apuestas-service
        image: 546388928625.dkr.ecr.us-east-1.amazonaws.com/apuestas-service:latest
        ports:
        - containerPort: 8005

        envFrom:
        - secretRef:
            name: casino-secrets

        resources:
          requests:
            cpu: "100m"

          limits:
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8005

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /livez
            port: 8005

          initialDelaySeconds: 10
          periodSeconds: 15